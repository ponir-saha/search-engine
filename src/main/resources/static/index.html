<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Commerce Search Platform</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f5ef;
      --panel: #ffffff;
      --text: #1e2528;
      --muted: #657174;
      --line: #d9ddd6;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --danger: #b42318;
      --shadow: 0 14px 35px rgba(31, 41, 35, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(15, 118, 110, 0.10), transparent 34%),
        linear-gradient(225deg, rgba(180, 83, 9, 0.10), transparent 32%),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 56px);
      line-height: 1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
    }

    .status-pill {
      min-width: 116px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      padding: 9px 13px;
      font-size: 14px;
      text-align: center;
      white-space: nowrap;
    }

    .nav-link {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--accent-dark);
      font-size: 14px;
      font-weight: 700;
      padding: 9px 14px;
      text-decoration: none;
      white-space: nowrap;
    }

    .search-panel {
      position: relative;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: var(--shadow);
    }

    .suggestions {
      display: none;
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .suggestions.open {
      display: block;
    }

    .suggestion-button {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      font: inherit;
      padding: 13px 16px;
      text-align: left;
    }

    .suggestion-button:last-child {
      border-bottom: 0;
    }

    .suggestion-button:hover {
      background: #f4fbf9;
    }

    .suggestion-type {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .search-input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 18px;
      padding: 14px 12px;
    }

    .search-input::placeholder {
      color: #8a9494;
    }

    .search-button {
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      padding: 0 22px;
      min-height: 50px;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .search-button:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    .search-button:disabled {
      cursor: progress;
      opacity: 0.72;
      transform: none;
    }

    .secondary-button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      padding: 0 18px;
      min-height: 50px;
      transition: border-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }

    .secondary-button:hover {
      border-color: var(--accent);
      color: var(--accent-dark);
      transform: translateY(-1px);
    }

    .secondary-button:disabled {
      cursor: progress;
      opacity: 0.72;
      transform: none;
    }

    .demo-strip {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .sample-query {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--accent-dark);
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      padding: 8px 12px;
    }

    .sample-query:hover {
      border-color: var(--accent);
      background: #f4fbf9;
    }

    .system-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .system-badge {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      padding: 7px 10px;
      text-transform: uppercase;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin: 28px 0 16px;
      color: var(--muted);
      font-size: 15px;
    }

    .message {
      margin: 0;
    }

    .message.error {
      color: var(--danger);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      min-height: 210px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 18px;
      box-shadow: 0 10px 22px rgba(31, 41, 35, 0.07);
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .description {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .price {
      font-size: 20px;
      font-weight: 800;
      color: var(--accent-dark);
      white-space: nowrap;
    }

    .product-id {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .empty {
      grid-column: 1 / -1;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.7);
      color: var(--muted);
      padding: 42px 18px;
      text-align: center;
    }

    @media (max-width: 960px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: min(100% - 24px, 1120px);
        padding: 28px 0;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .search-panel {
        grid-template-columns: 1fr;
      }

      .search-button {
        width: 100%;
        padding: 0 16px;
      }

      .secondary-button {
        width: 100%;
        padding: 0 16px;
      }

      .meta-row {
        align-items: flex-start;
        flex-direction: column;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <h1>AI Commerce Search</h1>
        <p class="subtitle">OpenSearch keyword relevance plus OpenAI/Weaviate semantic product discovery.</p>
        <div class="system-badges" aria-label="Search architecture">
          <span class="system-badge">OpenSearch</span>
          <span class="system-badge">AI Semantic</span>
          <span class="system-badge">Kafka CDC</span>
          <span class="system-badge">Observability</span>
        </div>
      </div>
      <a class="nav-link" href="/products.html">Manage Products</a>
      <div class="status-pill" id="status">Ready</div>
    </header>

    <form class="search-panel" id="searchForm">
      <input
        class="search-input"
        id="searchInput"
        name="q"
        type="search"
        autocomplete="off"
        placeholder="Search products"
        aria-label="Search products">
      <button class="search-button" id="searchButton" type="submit">Search</button>
      <button class="secondary-button" id="randomButton" type="button">Random 10</button>
    </form>
    <div class="demo-strip" aria-label="Demo searches">
      <span>Try:</span>
      <button class="sample-query" type="button" data-query="lap">lap</button>
      <button class="sample-query" type="button" data-query="type-c">type-c</button>
      <button class="sample-query" type="button" data-query="mobile charger">mobile charger</button>
      <button class="sample-query" type="button" data-query="wireless earbuds">wireless earbuds</button>
    </div>
    <div class="suggestions" id="suggestions" role="listbox" aria-label="Product suggestions"></div>

    <section class="meta-row" aria-live="polite">
      <p class="message" id="message">Loading products...</p>
      <span id="countText"></span>
    </section>

    <section class="grid" id="productGrid" aria-label="Products"></section>
  </main>

  <script>
    const form = document.getElementById("searchForm");
    const input = document.getElementById("searchInput");
    const button = document.getElementById("searchButton");
    const randomButton = document.getElementById("randomButton");
    const grid = document.getElementById("productGrid");
    const message = document.getElementById("message");
    const countText = document.getElementById("countText");
    const status = document.getElementById("status");
    const suggestions = document.getElementById("suggestions");

    const API_BASE_URL = window.location.protocol === "file:"
      ? "http://localhost:8082"
      : window.location.origin;
    const starterQueries = ["phone", "apple", "samsung", "pixel", "laptop", "tablet", "type-c", "mobile charger"];
    let activeController = null;
    let suggestionController = null;
    let debounceTimer = null;
    let suggestionTimer = null;

    function setLoading(isLoading) {
      button.disabled = isLoading;
      randomButton.disabled = isLoading;
      status.textContent = isLoading ? "Loading" : "Ready";
    }

    function setMessage(text, isError = false) {
      message.textContent = text;
      message.classList.toggle("error", isError);
    }

    function formatPrice(price) {
      if (price === null || price === undefined || Number.isNaN(Number(price))) {
        return "$0.00";
      }

      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD"
      }).format(Number(price));
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderProducts(products) {
      if (!products.length) {
        grid.innerHTML = '<div class="empty">No products found.</div>';
        return;
      }

      grid.innerHTML = products.map((product) => `
        <article class="card">
          <div>
            <h2>${escapeHtml(product.name || "Unnamed product")}</h2>
            <p class="description">${escapeHtml(product.description || "No description available.")}</p>
          </div>
          <div class="card-footer">
            <span class="price">${formatPrice(product.price)}</span>
            <span class="product-id">#${escapeHtml(product.id ?? "-")}</span>
          </div>
        </article>
      `).join("");
    }

    function closeSuggestions() {
      suggestions.classList.remove("open");
      suggestions.innerHTML = "";
    }

    function renderSuggestions(items) {
      if (!items.length) {
        closeSuggestions();
        return;
      }

      suggestions.innerHTML = items.slice(0, 5).map((item) => `
        <button class="suggestion-button" type="button" data-text="${escapeHtml(item.text || "")}">
          <span>${escapeHtml(item.text || "")}</span>
          <span class="suggestion-type">${escapeHtml(item.type || "SUGGESTION")}</span>
        </button>
      `).join("");
      suggestions.classList.add("open");
    }

    async function fetchSuggestions(query) {
      const q = query.trim();
      if (q.length < 2) {
        closeSuggestions();
        return;
      }

      if (suggestionController) {
        suggestionController.abort();
      }

      suggestionController = new AbortController();
      try {
        const params = new URLSearchParams({ q, size: "5" });
        const response = await fetch(`${API_BASE_URL}/api/products/suggestions?${params.toString()}`, {
          signal: suggestionController.signal,
          headers: {
            "Accept": "application/json"
          }
        });

        if (!response.ok) {
          throw new Error(`Suggestion request failed with status ${response.status}`);
        }

        const data = await response.json();
        renderSuggestions(Array.isArray(data.suggestions) ? data.suggestions : []);
      } catch (error) {
        if (error.name !== "AbortError") {
          closeSuggestions();
        }
      }
    }

    function pickRandomQuery() {
      return starterQueries[Math.floor(Math.random() * starterQueries.length)];
    }

    async function fetchProducts(query, options = {}) {
      const q = query.trim();
      if (!q) {
        return;
      }

      if (activeController) {
        activeController.abort();
      }

      activeController = new AbortController();
      setLoading(true);
      setMessage(options.isRandom ? "Loading 10 products..." : `Searching "${q}"...`);
      countText.textContent = "";

      try {
        const params = new URLSearchParams({ q, page: "0", size: "10" });
        const response = await fetch(`${API_BASE_URL}/api/products/search?${params.toString()}`, {
          signal: activeController.signal,
          headers: {
            "Accept": "application/json"
          }
        });

        if (!response.ok) {
          throw new Error(`Request failed with status ${response.status}`);
        }

        const data = await response.json();
        const products = Array.isArray(data.items) ? data.items : [];

        renderProducts(products);
        if (options.isRandom) {
          setMessage(products.length ? "Showing 10 products." : "No products found.");
        } else {
          setMessage(products.length ? `Showing results for "${q}".` : `No products found for "${q}".`);
        }
        countText.textContent = `${products.length} of ${data.totalElements ?? products.length}`;
      } catch (error) {
        if (error.name !== "AbortError") {
          renderProducts([]);
          setMessage("Could not load products. Make sure the backend, Postgres, and OpenSearch are running.", true);
        }
      } finally {
        setLoading(false);
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      closeSuggestions();
      fetchProducts(input.value);
    });

    randomButton.addEventListener("click", () => {
      const randomQuery = pickRandomQuery();
      input.value = "";
      closeSuggestions();
      fetchProducts(randomQuery, { isRandom: true });
    });

    suggestions.addEventListener("click", (event) => {
      const button = event.target.closest(".suggestion-button");
      if (!button) {
        return;
      }

      input.value = button.dataset.text;
      closeSuggestions();
      fetchProducts(input.value);
    });

    document.querySelectorAll(".sample-query").forEach((queryButton) => {
      queryButton.addEventListener("click", () => {
        input.value = queryButton.dataset.query;
        closeSuggestions();
        fetchProducts(input.value);
      });
    });

    input.addEventListener("input", () => {
      clearTimeout(debounceTimer);
      clearTimeout(suggestionTimer);
      suggestionTimer = setTimeout(() => {
        fetchSuggestions(input.value);
      }, 180);
      debounceTimer = setTimeout(() => {
        const query = input.value.trim();
        if (query.length >= 2) {
          fetchProducts(query);
        }
      }, 350);
    });

    document.addEventListener("click", (event) => {
      if (!event.target.closest("#searchForm") && !event.target.closest("#suggestions")) {
        closeSuggestions();
      }
    });

    fetchProducts(pickRandomQuery(), { isRandom: true });
  </script>
</body>
</html>
