<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Product Manager</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7f6;
      --panel: #ffffff;
      --text: #1e2528;
      --muted: #667174;
      --line: #d8dedb;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --danger: #b42318;
      --danger-bg: #fff1ef;
      --shadow: 0 14px 32px rgba(24, 38, 34, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .nav-link {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--accent-dark);
      font-size: 14px;
      font-weight: 700;
      padding: 9px 14px;
      text-decoration: none;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 18px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid var(--line);
      padding: 16px 18px;
    }

    .panel-title {
      margin: 0;
      font-size: 17px;
      letter-spacing: 0;
    }

    .message {
      color: var(--muted);
      font-size: 14px;
    }

    .message.error {
      color: var(--danger);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 13px 14px;
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    td {
      font-size: 14px;
    }

    .col-id {
      width: 82px;
    }

    .col-price {
      width: 116px;
    }

    .col-actions {
      width: 146px;
    }

    .product-name {
      font-weight: 800;
      line-height: 1.3;
    }

    .product-description {
      color: var(--muted);
      line-height: 1.4;
      margin-top: 4px;
      overflow-wrap: anywhere;
    }

    .actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    button {
      border: 0;
      border-radius: 6px;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      min-height: 38px;
      padding: 0 13px;
    }

    button:disabled {
      cursor: progress;
      opacity: 0.65;
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
    }

    .danger {
      background: var(--danger-bg);
      color: var(--danger);
    }

    .pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
    }

    .pager-buttons {
      display: flex;
      gap: 8px;
    }

    .form {
      display: grid;
      gap: 13px;
      padding: 18px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: 15px;
      outline: 0;
      padding: 11px 12px;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
    }

    .form-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 4px;
    }

    .empty {
      color: var(--muted);
      padding: 34px 18px;
      text-align: center;
    }

    @media (max-width: 940px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      .shell {
        width: min(100% - 24px, 1180px);
        padding: 24px 0;
      }

      .topbar,
      .panel-header,
      .pagination {
        align-items: flex-start;
        flex-direction: column;
      }

      table,
      thead,
      tbody,
      tr,
      th,
      td {
        display: block;
      }

      thead {
        display: none;
      }

      tr {
        border-bottom: 1px solid var(--line);
        padding: 12px 0;
      }

      td {
        border-bottom: 0;
        padding: 7px 14px;
      }

      .col-id,
      .col-price,
      .col-actions {
        width: auto;
      }

      .actions {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>Product Manager</h1>
        <p class="subtitle">Create, update, delete, and page through products.</p>
      </div>
      <a class="nav-link" href="/">Search Page</a>
    </header>

    <section class="layout">
      <section class="panel">
        <div class="panel-header">
          <h2 class="panel-title">Products</h2>
          <span class="message" id="listMessage">Loading products...</span>
        </div>

        <div id="tableWrap"></div>

        <div class="pagination">
          <span id="pageText" class="message"></span>
          <div class="pager-buttons">
            <button class="secondary" id="previousButton" type="button">Previous</button>
            <button class="secondary" id="nextButton" type="button">Next</button>
          </div>
        </div>
      </section>

      <aside class="panel">
        <div class="panel-header">
          <h2 class="panel-title" id="formTitle">Create Product</h2>
          <button class="secondary" id="newButton" type="button">New</button>
        </div>

        <form class="form" id="productForm">
          <input id="productId" type="hidden">

          <label>
            Name
            <input id="nameInput" type="text" required maxlength="180">
          </label>

          <label>
            Description
            <textarea id="descriptionInput" required maxlength="1000"></textarea>
          </label>

          <label>
            Price
            <input id="priceInput" type="number" required min="0" step="0.01">
          </label>

          <div class="form-actions">
            <button class="primary" id="saveButton" type="submit">Create</button>
            <button class="secondary" id="resetButton" type="button">Clear</button>
          </div>
          <span class="message" id="formMessage"></span>
        </form>
      </aside>
    </section>
  </main>

  <script>
    const API_BASE_URL = window.location.protocol === "file:"
      ? "http://localhost:8082"
      : window.location.origin;
    const pageSize = 10;

    let currentPage = 0;
    let totalElements = 0;
    let products = [];

    const tableWrap = document.getElementById("tableWrap");
    const listMessage = document.getElementById("listMessage");
    const pageText = document.getElementById("pageText");
    const previousButton = document.getElementById("previousButton");
    const nextButton = document.getElementById("nextButton");
    const form = document.getElementById("productForm");
    const formTitle = document.getElementById("formTitle");
    const productId = document.getElementById("productId");
    const nameInput = document.getElementById("nameInput");
    const descriptionInput = document.getElementById("descriptionInput");
    const priceInput = document.getElementById("priceInput");
    const saveButton = document.getElementById("saveButton");
    const resetButton = document.getElementById("resetButton");
    const newButton = document.getElementById("newButton");
    const formMessage = document.getElementById("formMessage");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatPrice(price) {
      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD"
      }).format(Number(price || 0));
    }

    function setFormMessage(text, isError = false) {
      formMessage.textContent = text;
      formMessage.classList.toggle("error", isError);
    }

    function renderTable() {
      if (!products.length) {
        tableWrap.innerHTML = '<div class="empty">No products found.</div>';
      } else {
        tableWrap.innerHTML = `
          <table>
            <thead>
              <tr>
                <th class="col-id">ID</th>
                <th>Product</th>
                <th class="col-price">Price</th>
                <th class="col-actions">Actions</th>
              </tr>
            </thead>
            <tbody>
              ${products.map((product) => `
                <tr>
                  <td class="col-id">#${escapeHtml(product.id)}</td>
                  <td>
                    <div class="product-name">${escapeHtml(product.name)}</div>
                    <div class="product-description">${escapeHtml(product.description)}</div>
                  </td>
                  <td class="col-price">${formatPrice(product.price)}</td>
                  <td class="col-actions">
                    <div class="actions">
                      <button class="secondary" type="button" data-action="edit" data-id="${escapeHtml(product.id)}">Edit</button>
                      <button class="danger" type="button" data-action="delete" data-id="${escapeHtml(product.id)}">Delete</button>
                    </div>
                  </td>
                </tr>
              `).join("")}
            </tbody>
          </table>`;
      }

      const totalPages = Math.max(Math.ceil(totalElements / pageSize), 1);
      pageText.textContent = `Page ${currentPage + 1} of ${totalPages} (${totalElements} products)`;
      previousButton.disabled = currentPage === 0;
      nextButton.disabled = currentPage + 1 >= totalPages;
    }

    async function loadProducts(page = currentPage) {
      listMessage.textContent = "Loading products...";
      previousButton.disabled = true;
      nextButton.disabled = true;

      try {
        const params = new URLSearchParams({ page: String(page), size: String(pageSize) });
        const response = await fetch(`${API_BASE_URL}/api/products?${params.toString()}`);
        if (!response.ok) {
          throw new Error(`List failed with status ${response.status}`);
        }

        const data = await response.json();
        products = Array.isArray(data.items) ? data.items : [];
        currentPage = data.page ?? page;
        totalElements = data.totalElements ?? products.length;
        listMessage.textContent = "Ready";
        renderTable();
      } catch (error) {
        products = [];
        totalElements = 0;
        listMessage.textContent = "Could not load products.";
        listMessage.classList.add("error");
        renderTable();
      }
    }

    function resetForm() {
      productId.value = "";
      nameInput.value = "";
      descriptionInput.value = "";
      priceInput.value = "";
      formTitle.textContent = "Create Product";
      saveButton.textContent = "Create";
      setFormMessage("");
      nameInput.focus();
    }

    function editProduct(id) {
      const product = products.find((item) => String(item.id) === String(id));
      if (!product) {
        return;
      }

      productId.value = product.id;
      nameInput.value = product.name || "";
      descriptionInput.value = product.description || "";
      priceInput.value = product.price ?? "";
      formTitle.textContent = `Edit #${product.id}`;
      saveButton.textContent = "Update";
      setFormMessage("");
      nameInput.focus();
    }

    async function saveProduct(event) {
      event.preventDefault();
      saveButton.disabled = true;
      setFormMessage("Saving...");

      const id = productId.value;
      const payload = {
        name: nameInput.value.trim(),
        description: descriptionInput.value.trim(),
        price: Number(priceInput.value)
      };

      try {
        const response = await fetch(id ? `${API_BASE_URL}/api/products/${id}` : `${API_BASE_URL}/api/products`, {
          method: id ? "PUT" : "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error(`Save failed with status ${response.status}`);
        }

        resetForm();
        await loadProducts(id ? currentPage : 0);
        setFormMessage(id ? "Product updated." : "Product created.");
      } catch (error) {
        setFormMessage("Could not save product.", true);
      } finally {
        saveButton.disabled = false;
      }
    }

    async function deleteProduct(id) {
      if (!confirm(`Delete product #${id}?`)) {
        return;
      }

      listMessage.textContent = "Deleting...";
      try {
        const response = await fetch(`${API_BASE_URL}/api/products/${id}`, {
          method: "DELETE"
        });

        if (!response.ok) {
          throw new Error(`Delete failed with status ${response.status}`);
        }

        if (products.length === 1 && currentPage > 0) {
          currentPage -= 1;
        }
        await loadProducts(currentPage);
      } catch (error) {
        listMessage.textContent = "Could not delete product.";
        listMessage.classList.add("error");
      }
    }

    tableWrap.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) {
        return;
      }

      const id = button.dataset.id;
      if (button.dataset.action === "edit") {
        editProduct(id);
      }
      if (button.dataset.action === "delete") {
        deleteProduct(id);
      }
    });

    previousButton.addEventListener("click", () => {
      if (currentPage > 0) {
        loadProducts(currentPage - 1);
      }
    });

    nextButton.addEventListener("click", () => {
      loadProducts(currentPage + 1);
    });

    form.addEventListener("submit", saveProduct);
    resetButton.addEventListener("click", resetForm);
    newButton.addEventListener("click", resetForm);

    loadProducts();
  </script>
</body>
</html>
