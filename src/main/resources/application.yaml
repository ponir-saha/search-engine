spring:
  application:
    name: search-engine
  r2dbc:
    url: ${R2DBC_URL:r2dbc:postgresql://localhost:5432/products_db}
    username: ${POSTGRES_USER:pguser}
    password: ${POSTGRES_PASSWORD:pgpass}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}

opensearch:
  url: ${OPENSEARCH_URL:http://localhost:9200}

openai:
  api-key: ${OPENAI_API_KEY:}

app:
  products:
    index: ${OPENSEARCH_INDEX_PRODUCTS:products}
  kafka:
    topic: ${APP_KAFKA_TOPIC:dbserver1.public.products}
  bootstrap:
    enabled: ${APP_BOOTSTRAP_ENABLED:true}
    reset: ${APP_BOOTSTRAP_RESET:true}
    dataset: ${APP_BOOTSTRAP_DATASET:classpath:data/products.tsv}
    wait-for-indexes: ${APP_BOOTSTRAP_WAIT_FOR_INDEXES:true}
    wait-timeout: ${APP_BOOTSTRAP_WAIT_TIMEOUT:PT15M}

vectordb:
  url: ${VECTORDB_URL:http://localhost:8085}
  type: ${VECTORDB_TYPE:weaviate}

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  file:
    name: ${LOG_FILE:logs/search-engine.log}
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] trace=%X{traceId:-} span=%X{spanId:-} %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] trace=%X{traceId:-} span=%X{spanId:-} %logger{36} - %msg%n"
